<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Interactive Dashboard</title>\n    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            background-color: #f4f4f4;\n            margin: 0;\n            padding: 0;\n        }\n        header {\n            background: #35424a;\n            color: white;\n            padding: 10px 0;\n            text-align: center;\n        }\n        .container {\n            width: 80%;\n            margin: 20px auto;\n            background: white;\n            padding: 20px;\n            box-shadow: 0 0 10px rgba(0,0,0,0.1);\n        }\n        .card {\n            background: #e8e8e8;\n            margin: 10px;\n            padding: 10px;\n            border-radius: 5px;\n            text-align: center;\n        }\n    </style>\n</head>\n<body>\n<header>\n    <h1>Urban Flood Prediction Dashboard</h1>\n</header>\n<div class="container">\n    <div class="card">\n        <h2>Current Flood Risk Level</h2>\n        <p>Risk Level: <strong>Moderate</strong></p>\n    </div>\n    <div class="card">\n        <h2>Predicted Rainfall</h2>\n        <p>Expected Rainfall: <strong>50mm</strong></p>\n    </div>\n    <div class="card">\n        <h2>Historical Flood Data</h2>\n        <p>Number of Flood Incidents: <strong>15</strong></p>\n    </div>\n</div>\n<script>\n    // Interactive elements can be added here\n</script>\n</body>\n</html>
